<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Alam 2.113.13</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: white; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 30px; 
            width: 90%; 
            max-width: 400px; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; margin-bottom: 25px; font-size: 26px; }
        
        /* बटन के लिए कंटेनर स्टाइल */
        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .label { font-size: 14px; font-weight: bold; }
        .enc-label { color: #ff00ff; }
        .dec-label { color: #00d2ff; }

        /* छोटे एक्शन बटन का स्टाइल */
        .btn-action {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
            transition: 0.2s;
        }
        .btn-action:active { transform: scale(0.8); }

        textarea { 
            width: 100%; height: 65px; padding: 12px; border-radius: 15px; 
            border: none; margin-bottom: 15px; font-size: 16px; 
            background: rgba(0,0,0,0.3); color: #fff; outline: none;
            box-sizing: border-box; border: 1px solid #444;
        }
        textarea:focus { border-color: #00ffcc; }

        .display-area { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.5); 
            border-radius: 15px; min-height: 40px; font-size: 22px; 
            word-wrap: break-word; cursor: pointer; border: 2px dashed #555;
            box-sizing: border-box; margin-bottom: 25px;
            transition: 0.3s;
        }
        #codeOutput { color: #ff00ff; border-color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
        #textOutput { color: #00d2ff; border-color: #00d2ff; text-shadow: 0 0 5px #00d2ff; }
        
        #toast { 
            visibility: hidden; background: #00ffcc; color: #000; 
            font-weight: bold; padding: 10px 20px; border-radius: 20px; 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
        }
        #toast.show { visibility: visible; animation: pop 0.3s ease; }
        @keyframes pop { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Noor Alam 2.113.13</h2>
    
    <div class="label-row">
        <span class="label enc-label">नाम से कोड (Word to Code):</span>
        <div>
            <button class="btn-action" onclick="clearBox('textInput', 'codeOutput')" title="Clear">🗑️</button>
            <button class="btn-action" onclick="copyThis('codeOutput')" title="Copy">📋</button>
        </div>
    </div>
    <textarea id="textInput" placeholder="Hinglish" oninput="encodeText()"></textarea>
    <div class="display-area" id="codeOutput" onclick="copyThis('codeOutput')">---</div>

    <div class="label-row">
        <span class="label dec-label">कोड से नाम (Code to Word):</span>
        <div>
            <button class="btn-action" onclick="clearBox('codeInput', 'textOutput')" title="Clear">🗑️</button>
            <button class="btn-action" onclick="copyThis('textOutput')" title="Copy">📋</button>
        </div>
    </div>
    <textarea id="codeInput" placeholder="2.113.13" oninput="decodeText()"></textarea>
    <div class="display-area" id="textOutput" onclick="copyThis('textOutput')">---</div>
</div>

<div id="toast">Copied! ✅</div>

<script>
    const dMap = {
        'e':'13', 'f':'41', 'g':'83', 'h':'32', 'i':'52', 'n':'12', 'o':'11', 'r':'44', 's':'61', 't':'21', 'u':'43', 'v':'53', 'w':'22', 'x':'63'
    };
    const sMap = {
        'b':'1', 'c':'2', 'd':'3', 'j':'4', 'k':'5', 'l':'6', 'p':'7', 'q':'8', 'y':'9'
    };
    const specialNoDot = { 'a':'0', 'm':'#' };
    const zCode = { 'z':'0.' };

    const rev = {};
    for (let k in dMap) { rev[dMap[k]] = k; }
    for (let k in sMap) { rev[sMap[k] + "."] = k; }
    for (let k in specialNoDot) { rev[specialNoDot[k]] = k; }
    rev["0."] = "z"; 

    const hMap = {'न':'n','ू':'o','ो':'o','र':'r','अ':'a','ा':'a','ल':'l','म':'m','ु':'u','स':'s','क':'k','ि':'i','ी':'i'};

    function encodeText() {
        let input = document.getElementById('textInput').value.toLowerCase();
        let words = input.split(" ");
        let result = [];
        words.forEach(w => {
            let enc = "";
            for (let c of w) {
                let ec = hMap[c] || c;
                if (dMap[ec]) enc += dMap[ec];
                else if (sMap[ec]) enc += sMap[ec] + "."; 
                else if (specialNoDot[ec]) enc += specialNoDot[ec];
                else if (zCode[ec]) enc += zCode[ec];
                else enc += ec;
            }
            result.push(enc);
        });
        document.getElementById('codeOutput').innerText = result.join(" ") || "---";
    }

    function decodeText() {
        let input = document.getElementById('codeInput').value.trim();
        let words = input.split(" ");
        let result = [];
        words.forEach(w => {
            let dec = "";
            let i = 0;
            while (i < w.length) {
                if (w[i] === "0" && w[i+1] === ".") {
                    dec += "z"; i += 2;
                } else if (w[i] === "#") {
                    dec += "m"; i += 1;
                } else if (w[i] === "0" && w[i+1] !== ".") {
                    dec += "a"; i += 1;
                } else if (i + 1 < w.length && w[i+1] === ".") {
                    let code = w.substr(i, 2);
                    dec += rev[code] || "?";
                    i += 2;
                } else {
                    let code = w.substr(i, 2);
                    if (rev[code]) { dec += rev[code]; i += 2; }
                    else { dec += w[i]; i++; }
                }
            }
            result.push(dec);
        });
        document.getElementById('textOutput').innerText = result.join(" ") || "---";
    }

    // नया साफ़ करने वाला फंक्शन
    function clearBox(inputId, outputId) {
        document.getElementById(inputId).value = "";
        document.getElementById(outputId).innerText = "---";
    }

    function copyThis(id) {
        let text = document.getElementById(id).innerText;
        if (text === "---") return;
        navigator.clipboard.writeText(text).then(() => {
            let t = document.getElementById("toast");
            t.innerText = "Copied! ✅";
            t.className = "show";
            setTimeout(()=>{ t.className = ""; }, 2000);
        });
    }
</script>
</body>
</html>
