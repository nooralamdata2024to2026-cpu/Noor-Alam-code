            <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Alam 2.113.13</title>
    <style>
        /* स्क्रीनशॉट से बचने के लिए सिलेक्शन बंद करना */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: white; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 0.3s;
        }

        /* पासवर्ड वाला पर्दा */
        #lockScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0c29;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #lockScreen input {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #00ffcc;
            background: transparent;
            color: white;
            text-align: center;
            font-size: 18px;
            outline: none;
            margin-bottom: 15px;
        }

        #lockScreen button {
            padding: 10px 25px;
            background: #00ffcc;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 30px; 
            width: 90%; 
            max-width: 400px; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; margin-bottom: 25px; font-size: 26px; }
        
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .label { font-size: 14px; font-weight: bold; }
        .enc-label { color: #ff00ff; }
        .dec-label { color: #00d2ff; }

        .btn-action { background: none; border: none; cursor: pointer; font-size: 18px; padding: 0 5px; }

        textarea { 
            width: 100%; height: 65px; padding: 12px; border-radius: 15px; 
            border: none; margin-bottom: 15px; font-size: 16px; 
            background: rgba(0,0,0,0.3); color: #fff; outline: none;
            box-sizing: border-box; border: 1px solid #444;
        }

        .display-area { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.5); 
            border-radius: 15px; min-height: 40px; font-size: 22px; 
            word-wrap: break-word; cursor: pointer; border: 2px dashed #555;
            box-sizing: border-box; margin-bottom: 25px;
        }
        #codeOutput { color: #ff00ff; border-color: #ff00ff; }
        #textOutput { color: #00d2ff; border-color: #00d2ff; }
        
        #toast { 
            visibility: hidden; background: #00ffcc; color: #000; 
            font-weight: bold; padding: 10px 20px; border-radius: 20px; 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
        }
        #toast.show { visibility: visible; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="lockScreen">
    <h2 style="font-size: 20px;">Private Access</h2>
    <input type="password" id="passKey" placeholder="Password डालें">
    <button onclick="unlock()">Unlock</button>
</div>

<div class="container">
    <h2>Noor Alam 2.113.13</h2>
    
    <div class="label-row">
        <span class="label enc-label">नाम से कोड:</span>
        <div>
            <button class="btn-action" onclick="clearBox('textInput', 'codeOutput')">🗑️</button>
            <button class="btn-action" onclick="copyThis('codeOutput')">📋</button>
        </div>
    </div>
    <textarea id="textInput" placeholder="Hinglish..." oninput="encodeText()"></textarea>
    <div class="display-area" id="codeOutput" onclick="copyThis('codeOutput')">---</div>

    <div class="label-row">
        <span class="label dec-label">कोड से नाम:</span>
        <div>
            <button class="btn-action" onclick="clearBox('codeInput', 'textOutput')">🗑️</button>
            <button class="btn-action" onclick="copyThis('textOutput')">📋</button>
        </div>
    </div>
    <textarea id="codeInput" placeholder="2.113.13..." oninput="decodeText()"></textarea>
    <div class="display-area" id="textOutput" onclick="copyThis('textOutput')">---</div>
</div>

<div id="toast">Copied! ✅</div>

<script>
    // --- सुरक्षा सेटिंग्स ---
    const myPass = "1234"; // अपना पासवर्ड यहाँ बदलें

    function unlock() {
        let input = document.getElementById('passKey').value;
        if(input === myPass) {
            localStorage.setItem('appUnlocked', 'true');
            document.getElementById('lockScreen').style.display = 'none';
        } else {
            alert("गलत पासवर्ड!");
        }
    }

    // चेक करें कि क्या पहले अनलॉक किया जा चुका है
    if(localStorage.getItem('appUnlocked') === 'true') {
        document.getElementById('lockScreen').style.display = 'none';
    }

    // स्क्रीनशॉट रोकने की कोशिश: अगर यूजर टैब बदलेगा तो स्क्रीन धुंधली हो जाएगी
    window.addEventListener('blur', () => { document.body.style.filter = 'blur(20px)'; });
    window.addEventListener('focus', () => { document.body.style.filter = 'none'; });

    // कीबोर्ड सुरक्षा (F12, Ctrl+Shift+I, etc.)
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
    };

    // --- आपका ओरिजिनल लॉजिक ---
    const dMap = {'e':'13', 'f':'41', 'g':'83', 'h':'32', 'i':'52', 'n':'12', 'o':'11', 'r':'44', 's':'61', 't':'21', 'u':'43', 'v':'53', 'w':'22', 'x':'63'};
    const sMap = {'b':'1', 'c':'2', 'd':'3', 'j':'4', 'k':'5', 'l':'6', 'p':'7', 'q':'8', 'y':'9'};
    const specialNoDot = { 'a':'0', 'm':'#' };
    const zCode = { 'z':'0.' };
    const rev = {};
    for (let k in dMap) { rev[dMap[k]] = k; }
    for (let k in sMap) { rev[sMap[k] + "."] = k; }
    for (let k in specialNoDot) { rev[specialNoDot[k]] = k; }
    rev["0."] = "z"; 
    const hMap = {'न':'n','ू':'o','ो':'o','र':'r','अ':'a','ा':'a','ल':'l','म':'m','ु':'u','स':'s','क':'k','ि':'i','ी':'i'};

    function encodeText() {
        let input = document.getElementById('textInput').value.toLowerCase();
        let words = input.split(" ");
        let result = [];
        words.forEach(w => {
            let enc = "";
            for (let c of w) {
                let ec = hMap[c] || c;
                if (dMap[ec]) enc += dMap[ec];
                else if (sMap[ec]) enc += sMap[ec] + "."; 
                else if (specialNoDot[ec]) enc += specialNoDot[ec];
                else if (zCode[ec]) enc += zCode[ec];
                else enc += ec;
            }
            result.push(enc);
        });
        document.getElementById('codeOutput').innerText = result.join(" ") || "---";
    }

    function decodeText() {
        let input = document.getElementById('codeInput').value.trim();
        let words = input.split(" ");
        let result = [];
        words.forEach(w => {
            let dec = "";
            let i = 0;
            while (i < w.length) {
                if (w[i] === "0" && w[i+1] === ".") { dec += "z"; i += 2; }
                else if (w[i] === "#") { dec += "m"; i += 1; }
                else if (w[i] === "0" && w[i+1] !== ".") { dec += "a"; i += 1; }
                else if (i + 1 < w.length && w[i+1] === ".") {
                    let code = w.substr(i, 2);
                    dec += rev[code] || "?"; i += 2;
                } else {
                    let code = w.substr(i, 2);
                    if (rev[code]) { dec += rev[code]; i += 2; }
                    else { dec += w[i]; i++; }
                }
            }
            result.push(dec);
        });
        document.getElementById('textOutput').innerText = result.join(" ") || "---";
    }

    function clearBox(inputId, outputId) {
        document.getElementById(inputId).value = "";
        document.getElementById(outputId).innerText = "---";
    }

    function copyThis(id) {
        let text = document.getElementById(id).innerText;
        if (text === "---") return;
        navigator.clipboard.writeText(text).then(() => {
            let t = document.getElementById("toast");
            t.className = "show";
            setTimeout(()=>{ t.className = ""; }, 2000);
        });
    }
</script>
</body>
</html>
