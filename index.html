<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Alam 61113.13</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: white; min-height: 100vh; margin: 0;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* ट्यूटोरियल ओवरले */
        #tutorial-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 9999;
        }
        
        #step-content {
            position: absolute; background: #00ffcc; color: #000; 
            padding: 10px 15px; border-radius: 10px; font-weight: bold; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 13px;
            transition: all 0.3s ease; pointer-events: none; z-index: 10002;
        }

        .arrow-up { 
            width: 0; height: 0; border-left: 8px solid transparent; 
            border-right: 8px solid transparent; border-bottom: 10px solid #00ffcc; 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
        }

        /* लॉगिन स्क्रीन */
        #login-screen {
            background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 30px;
            backdrop-filter: blur(15px); text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }

        .container { 
            display: none; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 30px; width: 92%; max-width: 400px; 
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            max-height: 95vh; overflow-y: auto;
        }

        h2 { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; margin-top: 0; font-size: 24px; margin-bottom: 20px; }
        
        .action-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }

        .btn-action { 
            background: rgba(255,255,255,0.15); border: 1px solid #00ffcc; cursor: pointer; 
            font-size: 14px; padding: 6px 12px; border-radius: 8px; color: white; transition: 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-action:active { transform: scale(0.9); }
        
        textarea { 
            width: 100%; height: 60px; padding: 12px; border-radius: 15px; border: 1px solid #444;
            background: rgba(0,0,0,0.3); color: #fff; outline: none; box-sizing: border-box; margin-bottom: 10px; font-size: 16px;
        }
        
        .display-area { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border-radius: 15px; 
            min-height: 40px; font-size: 18px; word-wrap: break-word; border: 2px dashed #555; 
            margin-bottom: 15px; box-sizing: border-box;
        }

        #passInput { padding: 10px; border-radius: 10px; border: 1px solid #00ffcc; background: #000; color: #00ffcc; margin-bottom: 15px; text-align: center; width: 120px; }
        #loginBtn { background: #00ffcc; color: #000; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #toast { visibility: hidden; background: #00ffcc; color: #000; font-weight: bold; padding: 10px 20px; border-radius: 20px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10000; }
        #toast.show { visibility: visible; }

        .highlight { outline: 3px solid #00ffcc; outline-offset: 3px; z-index: 10001; position: relative; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div id="tutorial-overlay">
    <div id="step-content">
        <div class="arrow-up"></div>
        <span id="step-text"></span>
    </div>
</div>

<div id="login-screen">
    <h2>Security Lock 🔒</h2>
    <input type="password" id="passInput" placeholder="Password">
    <br>
    <button id="loginBtn" onclick="checkPassword()">Unlock</button>
</div>

<div class="container" id="mainContainer">
    <h2>Noor Alam 61113.13</h2>
    
    <p style="color:#ff00ff; font-size:11px; margin-bottom:5px; font-weight:bold;">WORD TO CODE</p>
    <textarea id="textInput" placeholder="लिखें..." oninput="encodeText()"></textarea>
    
    <div class="action-bar">
        <button class="btn-action" id="delBtn1" onclick="clearBox('textInput', 'codeOutput')">🗑️ Delete</button>
        <button class="btn-action" id="copyBtn1" onclick="copyThis('codeOutput')">📋 Copy</button>
    </div>
    
    <div class="display-area" id="codeOutput" style="color:#ff00ff; border-color:#ff00ff;">---</div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">

    <p style="color:#00d2ff; font-size:11px; margin-bottom:5px; font-weight:bold;">CODE TO WORD</p>
    <textarea id="codeInput" placeholder="कोड डालें..." oninput="decodeText()"></textarea>

    <div class="action-bar">
        <button class="btn-action" id="delBtn2" onclick="clearBox('codeInput', 'textOutput')">🗑️ Delete</button>
        <button class="btn-action" id="copyBtn2" onclick="copyThis('textOutput')">📋 Copy</button>
    </div>

    <div class="display-area" id="textOutput" style="color:#00d2ff; border-color:#00d2ff;">---</div>
</div>

<div id="toast">Copied! ✅</div>

<script>
    window.onload = function() {
        if(localStorage.getItem('noor_v5_auth') === 'true') { showMain(); }
    };

    function checkPassword() {
        if (document.getElementById('passInput').value === "8614") {
            localStorage.setItem('noor_v5_auth', 'true');
            showMain();
        } else { alert("गलत पासवर्ड!"); }
    }

    function showMain() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'block';
        if(!localStorage.getItem('noor_v5_tour')) { setTimeout(startTutorial, 600); }
    }

    let currentStep = 0;
    const steps = [
        { id: "textInput", text: "वर्ड को कोड बनाने के लिए यहां क्लिक करें" },
        { id: "codeOutput", text: "यहां आपका कोड आएगा" },
        { id: "delBtn1", text: "Delete" },
        { id: "copyBtn1", text: "Copy" },
        { id: "codeInput", text: "यहां कोड को वर्ड में बदलें" },
        { id: "textOutput", text: "यहां आपके कोड का मतलब" },
        { id: "delBtn2", text: "Delete" },
        { id: "copyBtn2", text: "Copy" }
    ];

    function startTutorial() {
        document.getElementById('tutorial-overlay').style.display = 'block';
        updateStep();
    }

    function handleGlobalClick(e) {
        if(document.getElementById('tutorial-overlay').style.display === 'block') { nextStep(); }
    }

    function nextStep() {
        currentStep++;
        if(currentStep < steps.length) { updateStep(); }
        else {
            document.getElementById('tutorial-overlay').style.display = 'none';
            localStorage.setItem('noor_v5_tour', 'true');
            steps.forEach(s => document.getElementById(s.id).classList.remove('highlight'));
        }
    }

    function updateStep() {
        steps.forEach(s => document.getElementById(s.id).classList.remove('highlight'));
        const s = steps[currentStep];
        const target = document.getElementById(s.id);
        const tip = document.getElementById('step-content');
        
        target.classList.add('highlight');
        document.getElementById('step-text').innerText = s.text;

        const rect = target.getBoundingClientRect();
        tip.style.top = (rect.bottom + 15) + "px";
        tip.style.left = (rect.left + rect.width/2 - tip.offsetWidth/2) + "px";
        if(parseInt(tip.style.left) < 10) tip.style.left = "10px";
    }

    // कोडिंग लॉजिक
    const dMap = {'e':'13', 'f':'41', 'g':'83', 'h':'32', 'i':'52', 'n':'12', 'o':'11', 'r':'44', 's':'61', 't':'21', 'u':'43', 'v':'53', 'w':'22', 'x':'63'};
    const sMap = {'b':'1', 'c':'2', 'd':'3', 'j':'4', 'k':'5', 'l':'6', 'p':'7', 'q':'8', 'y':'9'};
    const specialNoDot = { 'a':'0', 'm':'#' };
    const rev = {};
    for (let k in dMap) rev[dMap[k]] = k;
    for (let k in sMap) rev[sMap[k] + "."] = k;
    for (let k in specialNoDot) rev[specialNoDot[k]] = k;
    rev["0."] = "z";
    const hMap = {'न':'n','ू':'o','ो':'o','र':'r','अ':'a','ा':'a','ल':'l','म':'m','ु':'u','स':'s','क':'k','ि':'i','ी':'i'};

    function encodeText() {
        let input = document.getElementById('textInput').value.toLowerCase();
        let words = input.split(" ");
        let result = [];
        words.forEach(w => {
            let enc = "";
            for (let c of w) {
                let ec = hMap[c] || c;
                if (dMap[ec]) enc += dMap[ec];
                else if (sMap[ec]) enc += sMap[ec] + "."; 
                else if (specialNoDot[ec]) enc += specialNoDot[ec];
                else if (ec === 'z') enc += '0.';
                else enc += ec;
            }
            result.push(enc);
        });
        document.getElementById('codeOutput').innerText = result.join(" ") || "---";
    }

    function decodeText() {
        let input = document.getElementById('codeInput').value.trim();
        let words = input.split(" ");
        let result = [];
        words.forEach(w => {
            let dec = ""; let i = 0;
            while (i < w.length) {
                if (w[i] === "0" && w[i+1] === ".") { dec += "z"; i += 2; }
                else if (w[i] === "#") { dec += "m"; i += 1; }
                else if (w[i] === "0") { dec += "a"; i += 1; }
                else if (i + 1 < w.length && w[i+1] === ".") { let code = w.substr(i, 2); dec += rev[code] || "?"; i += 2; }
                else { let code = w.substr(i, 2); if (rev[code]) { dec += rev[code]; i += 2; } else { dec += w[i]; i++; } }
            }
            result.push(dec);
        });
        document.getElementById('textOutput').innerText = result.join(" ") || "---";
    }

    function clearBox(inputId, outputId) {
        document.getElementById(inputId).value = "";
        document.getElementById(outputId).innerText = "---";
    }

    function copyThis(id) {
        let text = document.getElementById(id).innerText;
        if (text === "---") return;
        navigator.clipboard.writeText(text).then(() => {
            let t = document.getElementById("toast");
            t.className = "show";
            setTimeout(()=>{ t.className = ""; }, 2000);
        });
    }
</script>
</body>
</html>
