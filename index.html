<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Alam 2.113.13</title>
    <meta name="theme-color" content="#000000">
    
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22CodeWorld%22%2C%22short_name%22%3A%22CodeWorld%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fimg.icons8.com%2Ffluency%2F192%2F000000%2Fshield.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <style>
        :root { --bg: #f8f9fa; --dark: #d1d9e6; --accent: #0a2e1f; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card { background: var(--bg); padding: 25px; border-radius: 30px; box-shadow: 10px 10px 20px var(--dark), -10px -10px 20px #fff; width: 85%; max-width: 350px; text-align: center; margin-bottom: 25px; }
        input, textarea { width: 100%; border: none; background: none; border-bottom: 2px solid var(--accent); padding: 10px 0; font-size: 16px; outline: none; margin: 15px 0; }
        #main-app { display: none; width: 100%; flex-direction: column; align-items: center; }
        .output { width: 100%; min-height: 40px; border-bottom: 1.5px solid #333; margin: 15px 0; font-size: 18px; font-weight: bold; }
        .footer { font-size: 12px; font-weight: bold; color: var(--accent); margin-top: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="card">
        <div style="font-size: 50px;">🔒</div>
        <h2>Unlock App</h2>
        <input type="password" id="passInput" placeholder="Enter Password">
        <button onclick="checkPass()" style="width:100%; padding:10px; border-radius:10px; border:none; background:var(--accent); color:white; font-weight:bold;">UNLOCK</button>
    </div>
</div>

<div id="main-app">
    <div style="text-align:center;">
        <h1 style="color:var(--accent); margin:5px 0;">Noor Alam 2.113.13</h1>
        <p style="font-weight:bold; color:#666;">WELCOME TO CODE WORLD</p>
    </div>

    <div class="card">
        <h3>Word to Code</h3>
        <textarea id="ti" placeholder="Type here..." oninput="enc()"></textarea>
        <div class="output" id="co">--</div>
    </div>

    <div class="card">
        <h3>Code to Word</h3>
        <textarea id="ci" placeholder="Paste code..." oninput="dec()"></textarea>
        <div class="output" id="to">--</div>
    </div>
    <div class="footer">DESIGNED BY NOOR ALAM</div>
</div>

<script>
    const pass = "186142";
    function checkPass() {
        if(document.getElementById("passInput").value === pass) {
            localStorage.setItem("noor_auth", pass);
            show();
        } else { alert("Wrong!"); }
    }
    function show() {
        document.getElementById("lock-screen").style.display = "none";
        document.getElementById("main-app").style.display = "flex";
    }
    window.onload = () => { if(localStorage.getItem("noor_auth") === pass) show(); };

    // Simple Logic
    const dMap = {'e':'13', 'f':'41', 'g':'83', 'h':'32', 'i':'52', 'n':'12', 'o':'11', 'r':'44', 's':'61', 't':'21', 'u':'43', 'v':'53', 'w':'22', 'x':'63', 'a':'0', 'm':'#'};
    const sMap = {'b':'1.', 'c':'2.', 'd':'3.', 'j':'4.', 'k':'5.', 'l':'6.', 'p':'7.', 'q':'8.', 'y':'9.', 'z':'0.'};
    const rev = {}; 
    for(let k in dMap) rev[dMap[k]] = k;
    for(let k in sMap) rev[sMap[k]] = k;

    function enc() {
        let val = document.getElementById('ti').value.toLowerCase();
        let res = "";
        for(let c of val) {
            if(c === ' ') res += "/";
            else res += dMap[c] || sMap[c] || c;
        }
        document.getElementById('co').innerText = res || "--";
    }

    function dec() {
        let val = document.getElementById('ci').value;
        let res = "";
        let i = 0;
        while(i < val.length) {
            if(val[i] === '/') { res += " "; i++; }
            else if(val[i+1] === '.') { res += rev[val.substr(i,2)] || val[i]; i+=2; }
            else if(rev[val.substr(i,2)]) { res += rev[val.substr(i,2)]; i+=2; }
            else { res += rev[val[i]] || val[i]; i++; }
        }
        document.getElementById('to').innerText = res || "--";
    }
</script>
</body>
</html>
