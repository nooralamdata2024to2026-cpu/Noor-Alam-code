<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Alam 2.113.13</title>
    
    <meta name="theme-color" content="#f8f9fa">
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Noor%20Alam%20Code%22%2C%22short_name%22%3A%22CodeWorld%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f8f9fa%22%2C%22theme_color%22%3A%22%23f8f9fa%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fi.postimg.cc%2F0y0S8S0Z%2F1000022693.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">

    <style>
        :root { --bg: #f8f9fa; --sd: #d1d9e6; --sl: #ffffff; --acc: #0a2e1f; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Lock */
        #lock { position: fixed; inset: 0; background: var(--bg); z-index: 99; display: flex; align-items: center; justify-content: center; }
        .p-card { background: var(--bg); padding: 20px; border-radius: 20px; box-shadow: 8px 8px 15px var(--sd), -8px -8px 15px var(--sl); text-align: center; }
        input { width: 120px; padding: 8px; border: none; border-bottom: 2px solid var(--acc); background: none; text-align: center; font-size: 18px; outline: none; margin-bottom: 15px; }

        /* Main App - Compact Design */
        #app { display: none; width: 100%; flex-direction: column; align-items: center; }
        .h { text-align: center; margin-bottom: 15px; }
        .h h1 { font-size: 20px; color: var(--acc); margin: 2px 0; }
        .h span { font-size: 11px; color: #777; font-weight: bold; }

        .cont { width: 90%; max-width: 360px; }
        .card { background: var(--bg); border-radius: 18px; padding: 15px; margin-bottom: 20px; box-shadow: 6px 6px 12px var(--sd), -6px -6px 12px var(--sl); }
        
        .s-h { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .i-b { width: 32px; height: 32px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 3px 3px 6px var(--sd); font-weight: bold; font-size: 14px; }
        .t-x b { display: block; font-size: 13px; color: #333; }
        
        textarea { width: 100%; border: none; background: none; border-bottom: 1px solid #ddd; padding: 5px 0; font-size: 15px; outline: none; color: #444; resize: none; }
        .act { display: flex; gap: 10px; justify-content: flex-end; margin-top: -32px; }
        .btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--bg); box-shadow: 3px 3px 6px var(--sd), -3px -3px 6px var(--sl); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn svg { width: 16px; height: 16px; fill: #666; }

        .out { width: 100%; min-height: 30px; border-bottom: 2px solid #333; padding: 8px 0; font-size: 16px; color: #000; font-weight: 500; word-wrap: break-word; margin-top: 10px; }
        .f { margin-top: 15px; font-size: 10px; font-weight: bold; color: var(--acc); letter-spacing: 1px; }
        #tst { visibility: hidden; background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; position: fixed; bottom: 20px; font-size: 12px; }
        #tst.show { visibility: visible; }
    </style>
</head>
<body>

<div id="lock">
    <div class="p-card">
        <div style="font-size: 30px;">🔒</div>
        <input type="password" id="ps" placeholder="Password">
        <button class="btn" style="width: 100%; background: var(--acc); color: white;" onclick="ck()">Unlock</button>
    </div>
</div>

<div id="app">
    <div class="h">
        <div style="font-size: 30px;">🛡️</div>
        <h1>Noor Alam 2.113.13</h1>
        <span>🌹 #43615.012</span>
    </div>

    <div class="cont">
        <div class="card">
            <div class="s-h"><div class="i-b">T</div><div class="t-x"><b>Word to Code</b></div></div>
            <textarea id="tIn" placeholder="Text..." oninput="en()"></textarea>
            <div class="act">
                <button class="btn" onclick="clr('tIn','cOut')"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
                <button class="btn" onclick="res('tIn','cOut')"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></button>
            </div>
            <div style="text-align: center; margin: 10px 0; color: #ddd;">︾</div>
            <div class="out" id="cOut">--</div>
            <div class="act" style="margin-top: -35px;"><button class="btn" onclick="cp('cOut')"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button></div>
        </div>

        <div class="card">
            <div class="s-h"><div class="i-b">&lt;/&gt;</div><div class="t-x"><b>Code to Word</b></div></div>
            <textarea id="cIn" placeholder="Code..." oninput="de()"></textarea>
            <div class="act">
                <button class="btn" onclick="clr('cIn','tOut')"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
                <button class="btn" onclick="res('cIn','tOut')"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></button>
            </div>
            <div style="text-align: center; margin: 10px 0; color: #ddd;">︾</div>
            <div class="out" id="tOut">--</div>
            <div class="act" style="margin-top: -35px;"><button class="btn" onclick="cp('tOut')"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button></div>
        </div>
    </div>
    <div class="f">DESIGNED BY NOOR ALAM</div>
</div>

<div id="tst">Copied! ✅</div>

<script>
    const pass = "186142";
    window.onload = () => { if(localStorage.getItem("p")===pass) ok(); };
    function ck() { if(document.getElementById("ps").value===pass){ localStorage.setItem("p",pass); ok(); } else alert("X"); }
    function ok() { document.getElementById("lock").style.display="none"; document.getElementById("app").style.display="flex"; }

    const m1 = {'e':'13','f':'41','g':'83','h':'32','i':'52','n':'12','o':'11','r':'44','s':'61','t':'21','u':'43','v':'53','w':'22','x':'63','a':'0','m':'#'};
    const m2 = {'b':'1','c':'2','d':'3','j':'4','k':'5','l':'6','p':'7','q':'8','y':'9','z':'0'};
    const r = {}; for(let k in m1) r[m1[k]]=k; for(let k in m2) r[m2[k]+"."]=k;

    let ld = { i: "", t: "" };
    function en() {
        let v = document.getElementById('tIn').value.toLowerCase(), res = "";
        for(let c of v) res += (c===' ' ? "/" : (m1[c] || (m2[c] ? m2[c]+"." : c)));
        document.getElementById('cOut').innerText = res || "--";
    }
    function de() {
        let v = document.getElementById('cIn').value, res = "", i = 0;
        while(i < v.length) {
            if(v[i]==='/') { res+=" "; i++; }
            else if(v[i+1]==='.') { res+=r[v.substr(i,2)]||v[i]; i+=2; }
            else if(r[v.substr(i,2)]) { res+=r[v.substr(i,2)]; i+=2; }
            else { res+=r[v[i]]||v[i]; i++; }
        }
        document.getElementById('tOut').innerText = res || "--";
    }
    function clr(i,o) { ld={i:i,t:document.getElementById(i).value}; document.getElementById(i).value=""; document.getElementById(o).innerText="--"; }
    function res(i,o) { if(ld.i===i) { document.getElementById(i).value=ld.t; if(i==='tIn') en(); else de(); } }
    function cp(i) { navigator.clipboard.writeText(document.getElementById(i).innerText); let t=document.getElementById("tst"); t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1500); }
</script>
</body>
</html>
