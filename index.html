<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Alam 2.113.13</title>
    <meta name="theme-color" content="#0a2e1f">
    <link rel="apple-touch-icon" href="https://replit.com/cdn-cgi/image/width=192,quality=80/https://storage.googleapis.com/replit/images/1715421287955_c6d669a0397554f68593a61f4345f657.png">
    
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Noor%20Alam%20Code%22%2C%22short_name%22%3A%22CodeWorld%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%230a2e1f%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Freplit.com%2Fcdn-cgi%2Fimage%2Fwidth%3D192%2Cquality%3D80%2Fhttps%3A%2F%2Fstorage.googleapis.com%2Freplit%2Fimages%2F1715421287955_c6d669a0397554f68593a61f4345f657.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">
    
    <style>
        :root {
            --bg-color: #f8f9fa;
            --shadow-light: #ffffff;
            --shadow-dark: #d1d9e6;
            --accent-green: #0a2e1f;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-color);
            margin: 0; padding: 20px 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* लॉक स्क्रीन स्टाइल */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .pass-card {
            background: var(--bg-color); padding: 30px; border-radius: 30px;
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            text-align: center;
        }

        .pass-card input {
            width: 150px; padding: 10px; border: none; border-bottom: 2px solid var(--accent-green);
            background: none; text-align: center; font-size: 20px; outline: none; margin-bottom: 20px;
        }

        /* मेन कंटेनर */
        #main-app { display: none; width: 100%; display: flex; flex-direction: column; align-items: center; }

        .header { text-align: center; margin-bottom: 20px; }
        .shield { width: 40px; margin-bottom: 5px; opacity: 0.8; font-size: 35px; }
        .header h1 { font-size: 24px; color: var(--accent-green); margin: 5px 0; }
        .sub-header { font-size: 14px; color: #555; font-weight: bold; }

        .container { width: 92%; max-width: 400px; }

        .card {
            background: var(--bg-color); border-radius: 30px; padding: 20px; margin-bottom: 30px;
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
        }

        .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .icon-box {
            width: 38px; height: 38px; background: #fff; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 8px var(--shadow-dark); font-weight: bold;
        }
        .title-text b { display: block; font-size: 13px; text-transform: uppercase; }
        .title-text span { font-size: 12px; color: #888; }

        textarea {
            width: 100%; border: none; background: none; border-bottom: 1.5px solid #ccc;
            padding: 8px 0; font-size: 16px; outline: none; color: #333; resize: none;
        }

        .actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: -35px; }
        .btn {
            width: 38px; height: 38px; border-radius: 10px; border: none; background: #f8f9fa;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn svg { width: 18px; height: 18px; fill: #555; }

        .output {
            width: 100%; min-height: 35px; border-bottom: 1.5px solid #333;
            padding: 8px 0; font-size: 18px; color: #000; word-wrap: break-word;
        }

        .footer { margin-top: 20px; font-size: 11px; font-weight: bold; color: var(--accent-green); letter-spacing: 2px; }
        #toast { visibility: hidden; background: #333; color: #fff; padding: 10px 20px; border-radius: 50px; position: fixed; bottom: 30px; font-size: 14px; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="pass-card">
        <div style="font-size: 40px; margin-bottom: 15px;">🔒</div>
        <h3>Enter Password</h3>
        <input type="password" id="passInput" placeholder="******">
        <br>
        <button class="btn" style="width: 100%;" onclick="checkPassword()">Unlock</button>
    </div>
</div>

<div id="main-app">
    <div class="header">
        <div class="shield">🛡️</div>
        <h1>Noor Alam 2.113.13</h1>
        <div class="sub-header">🌹 #43615.012</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="section-header">
                <div class="icon-box">T</div>
                <div class="title-text"><b>Word to Code</b><span>Enter text</span></div>
            </div>
            <textarea id="textInput" placeholder="Enter text..." oninput="encodeText()"></textarea>
            <div class="actions">
                <button class="btn" onclick="clearWithUndo('textInput', 'codeOutput')">
                    <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                </button>
                <button class="btn" onclick="restoreText('textInput', 'codeOutput')">
                    <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
                </button>
            </div>
            <div style="text-align: center; margin: 15px 0; color: #bbb;">︾</div>
            <div class="output" id="codeOutput">--</div>
            <div class="actions" style="margin-top: -38px;">
                <button class="btn" onclick="copyThis('codeOutput')">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
            </div>
        </div>

        <div class="card">
            <div class="section-header">
                <div class="icon-box">&lt;/&gt;</div>
                <div class="title-text"><b>Code to Word</b><span>Enter code</span></div>
            </div>
            <textarea id="codeInput" placeholder="Enter code..." oninput="decodeText()"></textarea>
            <div class="actions">
                <button class="btn" onclick="clearWithUndo('codeInput', 'textOutput')">
                    <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                </button>
                <button class="btn" onclick="restoreText('codeInput', 'textOutput')">
                    <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
                </button>
            </div>
            <div style="text-align: center; margin: 15px 0; color: #bbb;">︾</div>
            <div class="output" id="textOutput">--</div>
            <div class="actions" style="margin-top: -38px;">
                <button class="btn" onclick="copyThis('textOutput')">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="footer">WELCOME TO MY CODE WORLD</div>
</div>

<div id="toast">Copied! ✅</div>

<script>
    // --- पासवर्ड लॉजिक (Baar Baar Nahi Maangega) ---
    const currentPassword = "186142"; // यहाँ अपना पासवर्ड बदल सकते हैं

    window.onload = function() {
        const savedPass = localStorage.getItem("app_password");
        // अगर पासवर्ड पहले से सेव है और वह 'currentPassword' से मैच करता है, तो सीधा ऐप खोलें
        if (savedPass === currentPassword) {
            showApp();
        }
    };

    function checkPassword() {
        const input = document.getElementById("passInput").value;
        if (input === currentPassword) {
            localStorage.setItem("app_password", currentPassword);
            showApp();
        } else {
            alert("Wrong Password! ❌");
        }
    }

    function showApp() {
        document.getElementById("lock-screen").style.display = "none";
        document.getElementById("main-app").style.display = "flex";
    }

    // --- ट्रांसलेटर लॉजिक (Muskan Wala Fix) ---
    const dMap = {'e':'13', 'f':'41', 'g':'83', 'h':'32', 'i':'52', 'n':'12', 'o':'11', 'r':'44', 's':'61', 't':'21', 'u':'43', 'v':'53', 'w':'22', 'x':'63'};
    const sMap = {'b':'1', 'c':'2', 'd':'3', 'j':'4', 'k':'5', 'l':'6', 'p':'7', 'q':'8', 'y':'9', 'z':'0'};
    const special = { 'a':'0', 'm':'#' };
    const hMap = {'न':'n','ू':'o','ो':'o','र':'r','अ':'a','ा':'a','ल':'l','म':'m','ु':'u','स':'s','क':'k','ि':'i','ी':'i'};

    // रिवर्स डिकोडिंग मैप
    const rev = {};
    for (let k in dMap) rev[dMap[k]] = k;
    for (let k in sMap) rev[sMap[k] + "."] = k; // '5.' -> 'k'
    for (let k in special) rev[special[k]] = k;

    let lastDeleted = { id: "", text: "" };

    function encodeText() {
        let input = document.getElementById('textInput').value.toLowerCase();
        let result = input.replace(/\(([^)]+)\)|(\S+)|(\s+)/g, (m, brac, word, space) => {
            if (brac) return `(${brac})`;
            if (space) return "/";
            let enc = "";
            for (let c of word) {
                let ec = hMap[c] || c;
                if (dMap[ec]) enc += dMap[ec];
                else if (sMap[ec]) enc += sMap[ec] + "."; 
                else if (special[ec]) enc += special[ec];
                else enc += ec;
            }
            return enc;
        });
        document.getElementById('codeOutput').innerText = result || "--";
    }

    function decodeText() {
        let input = document.getElementById('codeInput').value;
        let parts = input.split(/(\/|\([^)]+\))/); 
        let final = "";

        parts.forEach(p => {
            if (!p) return;
            if (p === "/") { final += " "; return; }
            if (p.startsWith("(") && p.endsWith(")")) { final += p; return; }

            let i = 0;
            while (i < p.length) {
                // पहले चेक करें कि क्या यह बिंदु वाला कोड है (जैसे 5.)
                if (i + 1 < p.length && p[i+1] === ".") {
                    final += rev[p.substr(i, 2)] || p[i];
                    i += 2;
                } 
                // फिर चेक करें 2 अंकों का कोड (जैसे 13)
                else if (i + 1 < p.length && rev[p.substr(i, 2)]) {
                    final += rev[p.substr(i, 2)];
                    i += 2;
                }
                // फिर सिंगल कैरेक्टर (# या 0)
                else {
                    final += rev[p[i]] || p[i];
                    i++;
                }
            }
        });
        document.getElementById('textOutput').innerText = final || "--";
    }

    function clearWithUndo(inputId, outputId) {
        lastDeleted = { id: inputId, text: document.getElementById(inputId).value };
        document.getElementById(inputId).value = "";
        document.getElementById(outputId).innerText = "--";
    }

    function restoreText(inputId, outputId) {
        if (lastDeleted.id === inputId) {
            document.getElementById(inputId).value = lastDeleted.text;
            if (inputId === 'textInput') encodeText(); else decodeText();
        }
    }

    function copyThis(id) {
        let text = document.getElementById(id).innerText;
        if (text === "--") return;
        navigator.clipboard.writeText(text).then(() => {
            let t = document.getElementById("toast");
            t.className = "show";
            setTimeout(()=>{ t.className = ""; }, 2000);
        });
    }
</script>
</body>
</html>
